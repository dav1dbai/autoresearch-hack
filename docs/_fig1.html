<!doctype html><html><head><meta charset="utf-8"><style>
  :root{--ink:#0f172a;--sub:#475569;--outer:#7c3aed;--outer-bg:#faf5ff;
    --inner:#2563eb;--inner-bg:#eff6ff;--frozen:#475569;--frozen-bg:#f1f5f9;
    --reward:#16a34a;--amber:#d97706;}
  *{box-sizing:border-box} html,body{margin:0;background:#fff}
  body{font-family:-apple-system,"Segoe UI",system-ui,sans-serif;-webkit-font-smoothing:antialiased;width:1212px;padding:26px 16px 10px}
  .ftitle{font-size:17px;font-weight:650;margin:0 0 8px;color:var(--ink)}
  .ftitle .tag{font-weight:500;color:var(--sub)}
  svg{display:block;width:1180px;height:auto;font-family:inherit}
  .bx-t{font-weight:650;font-size:14px}.bx-s{font-size:12px;fill:var(--sub)}
  .lbl{font-size:12px;font-weight:600}
</style></head><body>
  <div class="ftitle">① The two loops <span class="tag">&mdash; the outer loop optimizes the <em>strategy</em>; the inner loop optimizes a <em>kernel</em></span></div>
  <svg viewBox="0 0 1180 740" role="img" aria-label="nested loops">
    <defs>
      <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#334155"/></marker>
      <marker id="av" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#7c3aed"/></marker>
      <marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#16a34a"/></marker>
    </defs>
    <rect x="24" y="24" width="1132" height="246" rx="16" fill="var(--outer-bg)" stroke="var(--outer)" stroke-width="1.5"/>
    <text x="44" y="50" class="lbl" fill="var(--outer)">OUTER LOOP &middot; AR&sup2; &nbsp;(<tspan font-family="ui-monospace,Menlo,monospace">drive</tspan> + <tspan font-family="ui-monospace,Menlo,monospace">improve</tspan>)</text>
    <rect x="50"  y="112" width="170" height="96" rx="11" fill="#fff" stroke="var(--outer)" stroke-width="1.5"/>
    <text text-anchor="middle"><tspan x="135" y="150" class="bx-t">π₀ seed strategy</tspan><tspan x="135" y="170" class="bx-s">ar/solve + ar/improve</tspan><tspan x="135" y="187" class="bx-s">(dumb single-edit)</tspan></text>
    <rect x="278" y="112" width="186" height="96" rx="11" fill="#fff" stroke="var(--outer)" stroke-width="1.5"/>
    <text text-anchor="middle"><tspan x="371" y="150" class="bx-t">evaluate πₖ</tspan><tspan x="371" y="170" class="bx-s">run πₖ.solve on</tspan><tspan x="371" y="187" class="bx-s">the kernel → curve</tspan></text>
    <rect x="522" y="112" width="170" height="96" rx="11" fill="#fff" stroke="var(--outer)" stroke-width="1.5"/>
    <text text-anchor="middle"><tspan x="607" y="146" class="bx-t">archive</tspan><tspan x="607" y="166" class="bx-s">strategies +</tspan><tspan x="607" y="183" class="bx-s">their climb curves</tspan></text>
    <rect x="750" y="112" width="170" height="96" rx="11" fill="#fff" stroke="var(--outer)" stroke-width="1.5"/>
    <text text-anchor="middle"><tspan x="835" y="146" class="bx-t">select parent</tspan><tspan x="835" y="166" class="bx-s">frontier, by</tspan><tspan x="835" y="183" class="bx-s">held-out reward</tspan></text>
    <rect x="978" y="112" width="156" height="96" rx="11" fill="#fff" stroke="var(--outer)" stroke-width="1.5"/>
    <text text-anchor="middle"><tspan x="1056" y="146" class="bx-t">improve()</tspan><tspan x="1056" y="166" class="bx-s">meta-agent edits</tspan><tspan x="1056" y="183" class="bx-s">a snapshot of ar/</tspan></text>
    <line x1="220" y1="160" x2="272" y2="160" stroke="#334155" stroke-width="1.6" marker-end="url(#a)"/>
    <line x1="464" y1="160" x2="516" y2="160" stroke="#334155" stroke-width="1.6" marker-end="url(#a)"/>
    <line x1="692" y1="160" x2="744" y2="160" stroke="#334155" stroke-width="1.6" marker-end="url(#a)"/>
    <line x1="920" y1="160" x2="972" y2="160" stroke="#334155" stroke-width="1.6" marker-end="url(#a)"/>
    <path d="M1056,112 C1056,74 1056,74 920,74 L470,74 C400,74 371,74 371,108" fill="none" stroke="var(--outer)" stroke-width="1.6" marker-end="url(#av)"/>
    <text x="700" y="68" text-anchor="middle" class="lbl" fill="var(--outer)">π₍ₖ₊₁₎ &mdash; the next, hopefully-better researcher</text>
    <path d="M371,208 C371,250 230,250 230,300" fill="none" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#a)"/>
    <text x="312" y="262" class="bx-s" font-style="italic">spawns one solve run ↓</text>
    <rect x="24" y="300" width="760" height="230" rx="16" fill="var(--inner-bg)" stroke="var(--inner)" stroke-width="1.5"/>
    <text x="44" y="326" class="lbl" fill="var(--inner)">INNER LOOP &middot; autoresearch &nbsp;(one <tspan font-family="ui-monospace,Menlo,monospace">solve</tspan> run)</text>
    <rect x="48"  y="372" width="150" height="92" rx="11" fill="#fff" stroke="var(--inner)" stroke-width="1.5"/>
    <text text-anchor="middle"><tspan x="123" y="408" class="bx-t">env.reset()</tspan><tspan x="123" y="428" class="bx-s">kernel.rs starter</tspan><tspan x="123" y="445" class="bx-s">+ CHEATSHEET</tspan></text>
    <rect x="250" y="372" width="186" height="92" rx="11" fill="#fff" stroke="var(--inner)" stroke-width="1.5"/>
    <text text-anchor="middle"><tspan x="343" y="402" class="bx-t">codex edits kernel.rs</tspan><tspan x="343" y="422" class="bx-s">sees last reward</tspan><tspan x="343" y="439" class="bx-s">+ feedback</tspan></text>
    <rect x="488" y="372" width="120" height="92" rx="11" fill="#fff" stroke="var(--inner)" stroke-width="1.5"/>
    <text text-anchor="middle"><tspan x="548" y="414" class="bx-t">score()</tspan><tspan x="548" y="434" class="bx-s">ship kernel ↓</tspan></text>
    <rect x="648" y="372" width="116" height="92" rx="11" fill="#fff" stroke="var(--amber)" stroke-width="1.5"/>
    <text text-anchor="middle"><tspan x="706" y="408" class="bx-t" fill="var(--amber)">reward ↑ ?</tspan><tspan x="706" y="430" class="bx-s">keep / revert</tspan></text>
    <line x1="198" y1="418" x2="244" y2="418" stroke="#334155" stroke-width="1.6" marker-end="url(#a)"/>
    <line x1="436" y1="418" x2="482" y2="418" stroke="#334155" stroke-width="1.6" marker-end="url(#a)"/>
    <line x1="608" y1="418" x2="642" y2="418" stroke="#334155" stroke-width="1.6" marker-end="url(#a)"/>
    <path d="M706,464 C706,500 343,500 343,468" fill="none" stroke="var(--amber)" stroke-width="1.6" marker-end="url(#a)"/>
    <text x="520" y="514" text-anchor="middle" class="bx-s" font-style="italic">next iteration (hill-climb)</text>
    <rect x="808" y="300" width="348" height="230" rx="16" fill="var(--frozen-bg)" stroke="var(--frozen)" stroke-width="1.5"/>
    <text x="828" y="326" class="lbl" fill="var(--frozen)">GRADER &middot; deployed H100 &middot; 🔒 FROZEN</text>
    <rect x="832" y="360" width="300" height="146" rx="11" fill="#fff" stroke="var(--frozen)" stroke-width="1.5"/>
    <text text-anchor="middle">
      <tspan x="982" y="392" class="bx-t">referee (agent never sees it)</tspan>
      <tspan x="982" y="416" class="bx-s">splice kernel → FIXED host</tspan>
      <tspan x="982" y="434" class="bx-s">cargo oxide → PTX → run on GPU</tspan>
      <tspan x="982" y="452" class="bx-s">measure throughput</tspan>
      <tspan x="982" y="470" class="bx-s">+ correctness oracle</tspan>
      <tspan x="982" y="494" class="lbl" fill="var(--reward)">reward = clip(GFLOPS/target,0,1)·correct</tspan>
    </text>
    <line x1="600" y1="402" x2="828" y2="402" stroke="#334155" stroke-width="1.6" marker-end="url(#a)"/>
    <text x="690" y="394" text-anchor="middle" class="bx-s">kernel.rs</text>
    <line x1="828" y1="440" x2="600" y2="440" stroke="#16a34a" stroke-width="1.6" marker-end="url(#ag)"/>
    <text x="700" y="458" text-anchor="middle" class="bx-s" fill="var(--reward)">reward</text>
  </svg>
</body></html>
